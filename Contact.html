<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | E.M.E.P</title>
     <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
    
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <img src="./img/logo.png" alt="Logo" class="nav-logo" onerror="this.style.display='none'">
        <span class="logo-text">E.M.E.P</span>
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="./index.html">Schools</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="Contact.html" style="color: var(--primary-color);">Contact</a></li>
        <li><a href="./signin.html">Sign In</a></li>
    </ul>
</nav>

<main class="page-content">
    <div class="form-card" id="schools-section">
        <div class="header">
            <h2>School Inquiry</h2>
            <p>Providing excellence in early childhood and school education.</p>
        </div>

        <form id="dual-email-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="user_name" placeholder="Enter full name" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="user_email" placeholder="example@mail.com" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" name="user_phone" placeholder="01XXXXXXXXX" required>
            </div>

            <div class="input-group">
                <label>School of Interest</label>
                <select name="user_school" required>
                    <option value="" disabled selected>Select a location</option>
                    <option value="GEMS Academy Alexandria">GEMS Academy Alexandria</option>
                    <option value="Wellington International School">Wellington International School</option>
                    <option value="Wellington International Nursery">Wellington International Nursery</option>
                    <option value="Antoniadis International School">Antoniadis International School</option>
                    <option value="Antoniadis International Nursery">Antoniadis International Nursery</option>
                    <option value="Energize Future Child Care - KSA">Energize Future Child Care - KSA</option>
                </select>
            </div>

            <div class="input-group">
                <label>Additional Details</label>
                <textarea name="message" rows="4" placeholder="How can we assist you?" required></textarea>
            </div>

            <button type="submit" id="submit-btn">Submit Inquiry</button>
        </form>

        <div id="status-banner" class="status-msg"></div>
    </div>
</main>

<script type="text/javascript">
    (function() {
        emailjs.init("CnpIxhaOLNzG5QBMc");
    })();

    const form = document.getElementById('dual-email-form');
    const btn = document.getElementById('submit-btn');
    const banner = document.getElementById('status-banner');

    form.addEventListener('submit', function(event) {
        event.preventDefault();

        btn.innerText = 'Sending...';
        btn.disabled = true;

        const serviceID = 'service_tf1g9wj';
        const customerTemplateID = 'template_42tqfoe'; 
        const ownerTemplateID = 'template_j0igvij';    

        const sendCustomer = emailjs.sendForm(serviceID, customerTemplateID, this);
        const sendOwner = emailjs.sendForm(serviceID, ownerTemplateID, this);

        Promise.all([sendCustomer, sendOwner])
            .then(() => {
                btn.innerText = 'Submit Inquiry';
                btn.disabled = false;
                banner.innerText = '✓ Inquiry sent successfully! Check your email for confirmation.';
                banner.className = 'status-msg success';
                form.reset();
                setTimeout(() => { banner.style.display = 'none'; }, 6000);
            })
            .catch((err) => {
                btn.innerText = 'Submit Inquiry';
                btn.disabled = false;
                alert('An error occurred. Please try again.');
                console.error('EmailJS Error:', err);
            });
    });
</script>

</body>
</html>
